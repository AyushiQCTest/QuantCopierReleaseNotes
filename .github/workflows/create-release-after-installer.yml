name: Create Release After Installer Build

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Full Windows Installer Pipeline"
      - "Build and Upload Windows Installer"
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  packages: read

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout QuantCopierReleaseNotes repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Extract version from DEPLOYMENT.md
        id: version
        shell: bash
        run: |
          FILE="md_docs/DEPLOYMENT.md"

          # Try "Current Version: X.Y.Z" - using \K to reset match start (no lookbehind needed)
          VERSION=$(grep -oP 'Current Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' "$FILE" | head -1)

          # Try VERSION TO BUILD section
          if [ -z "$VERSION" ]; then
            VERSION=$(awk '/VERSION TO BUILD:/,/```/' "$FILE" | grep -oP '^\d+\.\d+\.\d+$' | head -1)
          fi

          # Fallback: first version-like pattern anywhere
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP '\d+\.\d+\.\d+' "$FILE" | head -1)
          fi

          if [ -z "$VERSION" ]; then
            echo "❌ Could not extract version from DEPLOYMENT.md"
            exit 1
          fi

          # Validate format
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Extracted value '$VERSION' is not a valid version"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Extracted version: $VERSION"

      - name: Checkout QuantCopierUI repo
        uses: actions/checkout@v4
        with:
          repository: AyushiQCTest/QuantCopierUI
          path: quantcopier-ui
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release already exists
        id: check-release
        shell: bash
        working-directory: quantcopier-ui
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Tag $TAG already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG does not exist, will create"
          fi

      - name: Create git tag and push
        if: steps.check-release.outputs.exists == 'false'
        shell: bash
        working-directory: quantcopier-ui
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag "$TAG" -m "Release $TAG - Automated from installer build"
          git push origin "$TAG"
          echo "✅ Created and pushed tag: $TAG"

      - name: Create GitHub Release
        if: steps.check-release.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
         # repository: AyushiQCTest/QuantCopierUI
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = "${{ steps.version.outputs.VERSION }}";
            const tag = "${{ steps.version.outputs.TAG }}";
            
            try {
              const release = await github.rest.repos.createRelease({
                owner: "AyushiQCTest",
                repo: "QuantCopierUI",
                tag_name: tag,
                name: `Release ${tag}`,
                body: `## Release ${tag}\n\nAutomatically generated from installer build pipeline.\n\nView release notes at: https://releases.quanttradertools.com/`,
                draft: false,
                prerelease: false
              });
              
              console.log(`✅ Created release: ${release.data.html_url}`);
            } catch (error) {
              if (error.status === 422) {
                console.log(`⚠️  Release for ${tag} already exists`);
              } else {
                throw error;
              }
            }

      - name: Create release on qcdemo repo
        if: steps.check-release.outputs.exists == 'false'
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          
          # Check if qcdemo repo is already cloned
          if [ ! -d "qcdemo" ]; then
            git clone https://github.com/AyushiQCTest/qcdemo.git qcdemo
          fi
          
          cd qcdemo
          git fetch origin
          
          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⚠️  Tag $TAG already exists on qcdemo"
          else
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git tag "$TAG" -m "Release $TAG - Synced from QuantCopierUI"
            git push origin "$TAG"
            echo "✅ Created tag $TAG on qcdemo repo"
          fi

      - name: Trigger release notes fetch
        if: steps.check-release.outputs.exists == 'false'
        shell: bash
        run: |
          echo "✅ Release created successfully!"
          echo "QuantCopierReleaseNotes will auto-fetch this release on next build"
          echo ""
          echo "📋 Summary:"
          echo "  - Version: ${{ steps.version.outputs.VERSION }}"
          echo "  - Tag: ${{ steps.version.outputs.TAG }}"
          echo "  - Release URL: https://github.com/AyushiQCTest/QuantCopierUI/releases/tag/${{ steps.version.outputs.TAG }}"

      - name: Release already exists
        if: steps.check-release.outputs.exists == 'true'
        run: |
          echo "⚠️  Release ${{ steps.version.outputs.TAG }} already exists"
          echo "No action taken to avoid duplicates"
