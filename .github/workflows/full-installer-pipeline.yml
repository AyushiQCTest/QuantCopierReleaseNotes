name: Full Windows Installer Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (optional for manual runs)"
        required: false
        default: ""

concurrency:
  group: full-installer-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "stable"
  PYTHON_VERSION: "3.x"
  FRONTEND_REPO: ${{ vars.FRONTEND_REPO || 'AyushiQCTest/QuantCopierUI' }}
  FRONTEND_REF: ${{ vars.FRONTEND_REF || 'discord' }}
  FRONTEND_PATH: "frontend"
  BACKEND_REPO: ${{ vars.BACKEND_REPO || 'AyushiQCTest/qcdemo' }}
  BACKEND_REF: ${{ vars.BACKEND_REF || 'main' }}
  BACKEND_PATH: "backend"
  FIREBASE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}

jobs:
  build-full-installer:
    name: Build & Upload Installer
    runs-on: windows-latest

    steps:
      # ------------------------------
      # Checkout both repositories
      # ------------------------------
      - name: Checkout workflow repo (release orchestrator)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout frontend app
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPO }}
          ref: ${{ env.FRONTEND_REF }}
          path: ${{ env.FRONTEND_PATH }}
          fetch-depth: 1
          token: ${{ secrets.FRONTEND_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      # Extract version and apply to PyInstaller & Inno Setup
      - name: Extract and apply version
        id: version
        shell: pwsh
        run: |
          # Priority 1: Read from markdown file (source of truth)
          $markdownFile = "md_docs/DEPLOYMENT.md"
          $version = $null
          
          if (Test-Path $markdownFile) {
            $content = Get-Content $markdownFile -Raw
            if ($content -match 'version:\s*\D*(\d+\.\d+\.\d+)') {
              $version = $matches[1]
              Write-Host "✓ Found version in markdown: $version"
            }
          }
          
          # Priority 2: Extract from GitHub release tag
          if (-not $version) {
            if ("${{ github.event_name }}" -eq "release") {
              $tag = "${{ github.event.release.tag_name }}"
              if ($tag -match "^v?(\d+\.\d+\.\d+.*)$") {
                $version = $matches[1]
                Write-Host "✓ Found version in release tag: $version"
              }
            }
          }
          
          # Priority 3: Fallback
          if (-not $version) {
            $version = "1.0.0"
            Write-Host "⚠ Using default version: $version"
          }
          
          Write-Host "📦 Final version: $version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          
          # Update PyInstaller spec file
          $specFile = "${{ env.FRONTEND_PATH }}/Backend/QuantCopierAPI.spec"
          if (Test-Path $specFile) {
            $content = Get-Content $specFile -Raw
            if ($content -match "version\s*=\s*'api_version_info") {
              Write-Host "✓ PyInstaller spec uses api_version_info.txt (version patched there)"
            } elseif ($content -match 'version\s*=') {
              $content = $content -replace "version\s*=\s*'[^']*'", "version='api_version_info.txt'"
              Set-Content $specFile -Value $content -Encoding UTF8 -NoNewline
              Write-Host "✓ Updated PyInstaller spec to use api_version_info.txt"
            } else {
              $content = $content -replace "(name='QuantCopierAPI',)", "name='QuantCopierAPI',`n    version='api_version_info.txt',"
              Set-Content $specFile -Value $content -Encoding UTF8 -NoNewline
              Write-Host "✓ Added version='api_version_info.txt' to PyInstaller spec"
            }
          }

          # Update api_version_info.txt (PyInstaller Windows PE metadata)
          $versionInfoFile = "${{ env.FRONTEND_PATH }}/Backend/api_version_info.txt"
          if (Test-Path $versionInfoFile) {
            $parts = $version -split '\.'
            $major = if ($parts.Length -gt 0) { $parts[0] } else { '1' }
            $minor = if ($parts.Length -gt 1) { $parts[1] } else { '0' }
            $patch = if ($parts.Length -gt 2) { $parts[2] } else { '0' }
            $tuple = "($major, $minor, $patch, 0)"
            $vi = Get-Content $versionInfoFile -Raw
            $vi = $vi -replace 'filevers\s*=\s*\([^)]+\)', "filevers=$tuple"
            $vi = $vi -replace 'prodvers\s*=\s*\([^)]+\)', "prodvers=$tuple"
            $vi = $vi -replace "(StringStruct\(u'FileVersion'[^)]*\))", "StringStruct(u'FileVersion',      u'$version.0')"
            $vi = $vi -replace "(StringStruct\(u'ProductVersion'[^)]*\))", "StringStruct(u'ProductVersion',   u'$version')"
            Set-Content $versionInfoFile -Value $vi -Encoding UTF8 -NoNewline
            Write-Host "✓ Updated api_version_info.txt: version=$version"
          }

          # Update Inno Setup script
          $issFile = "${{ env.FRONTEND_PATH }}/QCTelegramMT5_SetupExe_Spec.iss"
          if (Test-Path $issFile) {
            $content = Get-Content $issFile -Raw
            $content = $content -replace '#define MyAppVersion ".+?"', ('#define MyAppVersion "' + $version + '"')
            if ($content -match '#define MyFileVersion') {
              $content = $content -replace '#define MyFileVersion ".+?"', ('#define MyFileVersion "' + $version + '"')
            } else {
              $content = $content -replace "(#define MyAppVersion ""$version"")", "`$1`n#define MyFileVersion ""$version"""
            }
            Set-Content $issFile -Value $content -Encoding UTF8 -NoNewline
            Write-Host "✓ Updated Inno Setup: version=$version"
          }

          # Update tauri.conf.json (embeds into QuantCopierTelegramUI.exe PE header)
          $tauriConf = "${{ env.FRONTEND_PATH }}/src-tauri/tauri.conf.json"
          if (Test-Path $tauriConf) {
            $content = Get-Content $tauriConf -Raw
            $content = $content -replace '"version":\s*"[^"]+"', ('"version": "' + $version + '"')
            Set-Content $tauriConf -Value $content -Encoding UTF8 -NoNewline
            Write-Host "✓ Updated tauri.conf.json: version=$version"
          }

          # Update Cargo.toml (must match tauri.conf.json)
          $cargoToml = "${{ env.FRONTEND_PATH }}/src-tauri/Cargo.toml"
          if (Test-Path $cargoToml) {
            $content = Get-Content $cargoToml -Raw
            $content = $content -replace '(?m)^(version\s*=\s*)"[^"]+"', "`${1}""$version"""
            Set-Content $cargoToml -Value $content -Encoding UTF8 -NoNewline
            Write-Host "✓ Updated Cargo.toml: version=$version"
          }

          # Update package.json
          $pkgJson = "${{ env.FRONTEND_PATH }}/package.json"
          if (Test-Path $pkgJson) {
            $pkg = Get-Content $pkgJson -Raw | ConvertFrom-Json
            $pkg.version = $version
            $pkg | ConvertTo-Json -Depth 10 | Set-Content $pkgJson -Encoding UTF8 -NoNewline
            Write-Host "✓ Updated package.json: version=$version"
          }

      # Setup toolchains
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ${{ env.FRONTEND_PATH }}/src-tauri
          cache-on-failure: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { Write-Error "ISCC.exe not found"; exit 1 }
          echo "ISCC_PATH=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append


      - name: Create venv and install API backend deps
        shell: pwsh
        working-directory: ${{ env.FRONTEND_PATH }}\Backend
        run: |
          python -m venv .venv
          .\.venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          if (Test-Path requirements-dev.txt) { pip install -r requirements-dev.txt }

      - name: Build API sidecar executable (PyInstaller)
        shell: pwsh
        working-directory: ${{ env.FRONTEND_PATH }}\Backend
        run: |
          .\.venv\Scripts\Activate.ps1

          # Build must package real runtime configuration, not placeholders.
          # Support secrets named with APP_ prefix or without (fallback).
          $fb_db = "${{ secrets.APP_FIREBASE_DATABASE_URL }}"
          if ([string]::IsNullOrWhiteSpace($fb_db)) { $fb_db = "${{ secrets.FIREBASE_DATABASE_URL }}" }
          $fb_token = "${{ secrets.APP_FIREBASE_AUTH_TOKEN }}"
          if ([string]::IsNullOrWhiteSpace($fb_token)) { $fb_token = "${{ secrets.FIREBASE_AUTH_TOKEN }}" }
          $fb_creds_b64 = "${{ secrets.APP_FIREBASE_CREDENTIALS_JSON_B64 }}"
          if ([string]::IsNullOrWhiteSpace($fb_creds_b64)) { $fb_creds_b64 = "${{ secrets.FIREBASE_CREDENTIALS_JSON_B64 }}" }
          $sa_b64 = "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}"

          if ([string]::IsNullOrWhiteSpace($fb_db)) {
            Write-Error "Missing required secret: APP_FIREBASE_DATABASE_URL or FIREBASE_DATABASE_URL"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($fb_token)) {
            Write-Error "Missing required secret: APP_FIREBASE_AUTH_TOKEN or FIREBASE_AUTH_TOKEN"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($fb_creds_b64)) {
            Write-Error "Missing required secret: APP_FIREBASE_CREDENTIALS_JSON_B64 or FIREBASE_CREDENTIALS_JSON_B64"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($sa_b64)) {
            Write-Error "Missing required secret: FIREBASE_SERVICE_ACCOUNT_KEY"
            exit 1
          }

          # Decode the service account key from Base64 to inline JSON string.
          # This is embedded in .env as FIREBASE_SERVICE_ACCOUNT_KEY so the
          # GCPBucketManager can authenticate at runtime without a separate file.
          $sa_json = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($sa_b64))

          $envContent = @(
            "FIREBASE_CREDENTIALS_PATH=firebase-credentials.json",
            "FIREBASE_DATABASE_URL=$fb_db",
            "FIREBASE_AUTH_TOKEN=$fb_token",
            "FIREBASE_SERVICE_ACCOUNT_KEY=$sa_json"
          ) -join "`n"
          Set-Content -Path ".env" -Value $envContent.Trim() -Encoding UTF8 -NoNewline
          Write-Host "✓ .env written (FIREBASE_SERVICE_ACCOUNT_KEY embedded as inline JSON)"

          $credPath = "firebase-credentials.json"
          try {
            [IO.File]::WriteAllBytes($credPath, [Convert]::FromBase64String($fb_creds_b64))
          } catch {
            Write-Error "Provided Firebase credentials secret is not valid base64 JSON"
            exit 1
          }

          # Ensure non-secret required files exist for the .spec datas list.
          if (-not (Test-Path "config.ini")) {
            Set-Content -Path "config.ini" -Value "[DEFAULT]" -Encoding UTF8 -NoNewline
          }
          if (-not (Test-Path "symbol_mapper.json")) {
            Set-Content -Path "symbol_mapper.json" -Value "{}" -Encoding UTF8 -NoNewline
          }

          if (Test-Path QuantCopierAPI.spec) {
            pyinstaller QuantCopierAPI.spec
          } else {
            pyinstaller --onefile QuantCopierAPI.py
          }

      - name: Locate API sidecar binary
        id: api_sidecar
        shell: pwsh
        working-directory: ${{ env.FRONTEND_PATH }}\Backend
        run: |
          $bin = Get-ChildItem -Path dist -Filter *.exe -Recurse -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $bin) { Write-Error "API sidecar binary not found"; exit 1 }
          echo "API_SIDECAR_PATH=$($bin.FullName)" >> $env:GITHUB_OUTPUT
          echo "API_SIDECAR_NAME=$($bin.Name)" >> $env:GITHUB_OUTPUT
          Write-Host "Found API sidecar: $($bin.FullName)"

      - name: Normalize API sidecar filename
        shell: pwsh
        working-directory: ${{ env.FRONTEND_PATH }}\Backend
        run: |
          $src = "${{ steps.api_sidecar.outputs.API_SIDECAR_PATH }}"
          $dest = Join-Path $env:RUNNER_TEMP "QuantCopierAPI.exe"
          Copy-Item -Path $src -Destination $dest -Force
          echo "NORMALIZED_API_SIDECAR_PATH=$dest" >> $env:GITHUB_ENV
          echo "NORMALIZED_API_SIDECAR_NAME=QuantCopierAPI.exe" >> $env:GITHUB_ENV
          Write-Host "Normalized API sidecar: $dest"

      - name: Upload API sidecar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-sidecar-v${{ steps.version.outputs.VERSION }}
          path: ${{ env.NORMALIZED_API_SIDECAR_PATH }}
          retention-days: 90
          if-no-files-found: warn

      - name: Copy API sidecar into Tauri binaries folder
        shell: pwsh
        run: |
          $targetDir = Join-Path "${{ env.FRONTEND_PATH }}" "src-tauri\binaries"
          if (-not (Test-Path $targetDir)) { New-Item -ItemType Directory -Force -Path $targetDir | Out-Null }
          $targetName = "QuantCopierAPI-x86_64-pc-windows-msvc.exe"
          Copy-Item "${{ steps.api_sidecar.outputs.API_SIDECAR_PATH }}" (Join-Path $targetDir $targetName) -Force
          Write-Host "Copied API sidecar to $targetDir\$targetName"

      # ------------------------------
      # Build Tauri app
      # ------------------------------
      - name: Install frontend dependencies
        shell: pwsh
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build Tauri (Windows)
        shell: pwsh
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run tauri build

      - name: Locate and copy raw Tauri UI executable
        shell: pwsh
        run: |
          $src = "${{ env.FRONTEND_PATH }}\src-tauri\target\release\QuantCopierTelegramUI.exe"
          if (-not (Test-Path $src)) {
            $src = "${{ env.FRONTEND_PATH }}\src-tauri\target\release\QuantCopierMT5.exe"
          }
          if (-not (Test-Path $src)) {
            $src = Get-ChildItem -Path "${{ env.FRONTEND_PATH }}\src-tauri\target\release" -Filter *.exe -Recurse | 
                   Where-Object { $_.Name -like "*QuantCopier*" -and $_.Name -notlike "*API*" } | 
                   Sort-Object LastWriteTime -Descending | Select-Object -First 1
          }
          if (-not $src -or -not (Test-Path $src)) { Write-Error "Tauri raw executable not found"; exit 1 }
          $dest = Join-Path $env:RUNNER_TEMP "QuantCopierTelegramUI.exe"
          Copy-Item -Path $src -Destination $dest -Force
          echo "RAW_UI_PATH=$dest" >> $env:GITHUB_ENV
          echo "RAW_UI_NAME=QuantCopierTelegramUI.exe" >> $env:GITHUB_ENV
          Write-Host "Raw UI executable copied to: $dest"



      - name: Find Tauri installer
        id: tauri_installer
        shell: pwsh
        working-directory: ${{ env.FRONTEND_PATH }}
        run: |
          $patterns = @(
            "src-tauri\target\release\bundle\nsis\*.exe",
            "src-tauri\target\release\bundle\msi\*.exe",
            "src-tauri\target\release\*.exe"
          )
          $installer = $null
          foreach ($p in $patterns) {
            $found = Get-ChildItem -Path $p -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if ($found) { $installer = $found; break }
          }
          if (-not $installer) { Write-Error "Tauri installer not found"; exit 1 }
          echo "TAURI_INSTALLER=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          echo "TAURI_INSTALLER_NAME=$($installer.Name)" >> $env:GITHUB_OUTPUT
          Write-Host "Tauri installer: $($installer.FullName)"

      # ------------------------------
      # Package with Inno Setup
      # ------------------------------
      - name: Prepare Inno Setup script
        id: inno_prep
        shell: pwsh
        working-directory: ${{ env.FRONTEND_PATH }}
        run: |
          $iss = Get-ChildItem -Path *.iss -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iss) { Write-Error "Inno Setup .iss file not found"; exit 1 }
          $tempIss = Join-Path $env:RUNNER_TEMP "build.iss"
          $content = Get-Content $iss -Raw
          $appDir = Resolve-Path "."
          $content = $content -replace "\{APP_DIR\}", $appDir
          $content = $content -replace "\{OUTPUT_DIR\}", $env:RUNNER_TEMP
          Set-Content -Path $tempIss -Value $content -Encoding UTF8
          echo "INNO_ISS=$tempIss" >> $env:GITHUB_OUTPUT
          echo "INNO_ISS_NAME=$($iss.Name)" >> $env:GITHUB_OUTPUT
          Write-Host "Using ISS: $tempIss"

      - name: Run Inno Setup (ISCC)
        id: inno_run
        shell: pwsh
        run: |
          & "$env:ISCC_PATH" "${{ steps.inno_prep.outputs.INNO_ISS }}"
          $output = Get-ChildItem -Path $env:RUNNER_TEMP -Filter *.exe -Recurse -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $output) { Write-Error "Inno output exe not found"; exit 1 }
          echo "FINAL_INSTALLER=$($output.FullName)" >> $env:GITHUB_OUTPUT
          echo "FINAL_INSTALLER_NAME=$($output.Name)" >> $env:GITHUB_OUTPUT
          Write-Host "Inno installer: $($output.FullName)"

      - name: Normalize installer filename
        shell: pwsh
        run: |
          $src = "${{ steps.inno_run.outputs.FINAL_INSTALLER }}"
          $dest = Join-Path $env:RUNNER_TEMP "QuantCopier.exe"
          Copy-Item -Path $src -Destination $dest -Force
          echo "NORMALIZED_INSTALLER_PATH=$dest" >> $env:GITHUB_ENV
          echo "NORMALIZED_INSTALLER_NAME=QuantCopier.exe" >> $env:GITHUB_ENV
          Write-Host "Normalized installer: $dest"

      - name: Generate releases.json for auto-update
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $bucket = "${{ env.FIREBASE_BUCKET }}"
          $releaseTag = "v$version"
          $releasesJsonPath = Join-Path $env:RUNNER_TEMP "releases.json"

          # Use canonical artifact filenames
          $installerFile = "QuantCopierTelegramUI.exe"
          $apiFile = "QuantCopierAPI.exe"
          $baseUrl = "https://storage.googleapis.com/$bucket/Discord/$releaseTag/"

          $releaseData = @{
            latest = $releaseTag
            version = $version
            url = $baseUrl
            updatedAt = (Get-Date).ToUniversalTime().ToString("o")
            files = @{
              mainInstaller = $installerFile
              apiSidecar = $apiFile
            }
            downloads = @{
              mainInstaller = "$baseUrl$installerFile"
              apiSidecar = "$baseUrl$apiFile"
            }
          }

          $releaseData | ConvertTo-Json -Depth 6 | Set-Content -Path $releasesJsonPath -Encoding UTF8 -NoNewline
          echo "RELEASES_JSON_PATH=$releasesJsonPath" >> $env:GITHUB_ENV
          Write-Host "Generated releases.json at $releasesJsonPath"

      # ------------------------------
      # Upload to Firebase Storage
      # ------------------------------
      - name: Decode Firebase Service Account
        shell: pwsh
        run: |
          $b64 = "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}"
          if ([string]::IsNullOrWhiteSpace($b64)) { Write-Error "FIREBASE_SERVICE_ACCOUNT_KEY secret not configured"; exit 1 }
          $bucket = "${{ env.FIREBASE_BUCKET }}"
          if ([string]::IsNullOrWhiteSpace($bucket)) { Write-Error "FIREBASE_STORAGE_BUCKET secret not configured"; exit 1 }
          $jsonPath = "$env:RUNNER_TEMP\firebase-key.json"
          try {
            [IO.File]::WriteAllBytes($jsonPath, [Convert]::FromBase64String($b64))
          } catch {
            Write-Error "Failed to decode FIREBASE_SERVICE_ACCOUNT_KEY. Ensure it is valid Base64."
            exit 1
          }
          echo "GOOGLE_APPLICATION_CREDENTIALS=$jsonPath" >> $env:GITHUB_ENV
          Write-Host "✓ Service account credentials decoded"

      - name: Install upload dependencies
        shell: pwsh
        working-directory: .
        run: |
          python -m pip install --upgrade pip
          if (Test-Path scripts\requirements.txt) { pip install -r scripts\requirements.txt } else { pip install google-cloud-storage }

      - name: Upload installer to Firebase Storage
        id: firebase_upload
        shell: pwsh
        working-directory: .
        run: |
          function Invoke-Upload {
            param(
              [string]$Source,
              [string]$Destination
            )
            python scripts/upload_firebase.py --bucket "${{ env.FIREBASE_BUCKET }}" --file "$Source" --dest "$Destination" --credentials "$env:GOOGLE_APPLICATION_CREDENTIALS"
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Upload failed for destination: $Destination"
              exit 1
            }
          }

          $version = "${{ steps.version.outputs.VERSION }}"
          $releaseTag = "v$version"
          
          # Public installer
          $publicInstallerName = "QuantCopier.exe"
          $publicInstallerPath = "$env:NORMALIZED_INSTALLER_PATH"

          # Auto-update artifacts
          $uiName = "QuantCopierTelegramUI.exe"
          $uiPath = "$env:RAW_UI_PATH"

          $apiName = "QuantCopierAPI.exe"
          $apiPath = "$env:NORMALIZED_API_SIDECAR_PATH"

          # 1. Upload public installer (QuantCopier.exe)
          $dest = "Discord/$releaseTag/$publicInstallerName"
          Write-Host "Uploading public installer to GCS: $dest"
          Invoke-Upload -Source "$publicInstallerPath" -Destination $dest

          # 2. Upload raw UI executable (QuantCopierTelegramUI.exe)
          $uiDest = "Discord/$releaseTag/$uiName"
          Write-Host "Uploading raw UI executable to GCS: $uiDest"
          Invoke-Upload -Source "$uiPath" -Destination $uiDest

          # 3. Upload API sidecar executable (QuantCopierAPI.exe)
          $apiSidecarDest = "Discord/$releaseTag/$apiName"
          Write-Host "Uploading API sidecar to GCS: $apiSidecarDest"
          Invoke-Upload -Source "$apiPath" -Destination $apiSidecarDest

          $url = "https://firebasestorage.googleapis.com/v0/b/${{ env.FIREBASE_BUCKET }}/o/Discord%2F$releaseTag%2F$publicInstallerName?alt=media"
          $uiUrl = "https://firebasestorage.googleapis.com/v0/b/${{ env.FIREBASE_BUCKET }}/o/Discord%2F$releaseTag%2F$uiName?alt=media"
          $apiSidecarUrl = "https://firebasestorage.googleapis.com/v0/b/${{ env.FIREBASE_BUCKET }}/o/Discord%2F$releaseTag%2F$apiName?alt=media"
          $releasesJsonUrl = "https://storage.googleapis.com/${{ env.FIREBASE_BUCKET }}/Discord/releases.json"

          echo "FIREBASE_URL=$url" >> $env:GITHUB_ENV
          echo "UI_FIREBASE_URL=$uiUrl" >> $env:GITHUB_ENV
          echo "API_SIDECAR_FIREBASE_URL=$apiSidecarUrl" >> $env:GITHUB_ENV
          echo "RELEASES_JSON_URL=$releasesJsonUrl" >> $env:GITHUB_ENV
          echo "RELEASE_TAG=$releaseTag" >> $env:GITHUB_ENV
          echo "upload_success=true" >> $env:GITHUB_OUTPUT

      - name: Upload releases.json to Firebase root
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:RELEASES_JSON_PATH")) {
            Write-Error "releases.json was not generated"
            exit 1
          }
          python scripts/upload_firebase.py --bucket "${{ env.FIREBASE_BUCKET }}" --file "$env:RELEASES_JSON_PATH" --dest "Discord/releases.json" --cache-control "no-cache, max-age=0" --credentials "$env:GOOGLE_APPLICATION_CREDENTIALS"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to upload releases.json"
            exit 1
          }

      # ------------------------------
      # Upload artifact
      # ------------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ env.RELEASE_TAG || github.event.release.tag_name }}
          path: ${{ env.NORMALIZED_INSTALLER_PATH }}
          if-no-files-found: error
          retention-days: 90

      # ------------------------------
      # Summary
      # ------------------------------
      # Cleanup sensitive files
      - name: Cleanup Firebase Credentials
        if: always()
        shell: pwsh
        run: |
          $keyPath = "$env:RUNNER_TEMP\firebase-key.json"
          if (Test-Path $keyPath) {
            Remove-Item -Path $keyPath -Force
            Write-Host "✓ Cleaned up sensitive Firebase credentials"
          }

      - name: Summary
        if: steps.firebase_upload.outputs.upload_success == 'true'
        shell: pwsh
        run: |
          @"
          ## ✅ Full Installer Pipeline Complete
          - Release tag: `${{ env.RELEASE_TAG }}`
          - Installer: `QuantCopier.exe`
          - Raw UI App: `QuantCopierTelegramUI.exe`
          - API Sidecar: `QuantCopierAPI.exe`
